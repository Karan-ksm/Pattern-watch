# Render.com blueprint: deploy pattern-watch as a free web service.
# In the Render dashboard: New + -> Blueprint -> pick this repo.
# No API credentials needed: adsb.lol is free and auth-less.
#
# Free-tier note: the instance sleeps after ~15 min without visitors;
# the first request afterwards takes ~30-60 s while it wakes.
services:
  - type: web
    name: pattern-watch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      # Fast updates for a live demo. adsb.lol has no request budget,
      # polling pauses when nobody is watching, and a 429 (if they ever
      # rate-limit us) just skips cycles gracefully.
      - key: POLL_INTERVAL_S
        value: "5"
