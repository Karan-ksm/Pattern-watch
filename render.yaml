# Render.com blueprint: deploy pattern-watch as a free web service.
# In the Render dashboard: New + -> Blueprint -> pick this repo.
#
# After the first deploy, set these in the service's Environment tab
# (never commit credentials):
#   OPENSKY_CLIENT_ID     - from your OpenSky account's API client
#   OPENSKY_CLIENT_SECRET
#
# Free-tier note: the instance sleeps after ~15 min without visitors;
# the first request afterwards takes ~30-60 s while it wakes.
services:
  - type: web
    name: pattern-watch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      # Poll at half speed when hosted, to stretch the OpenSky
      # credit budget across the day.
      - key: POLL_INTERVAL_S
        value: "30"
