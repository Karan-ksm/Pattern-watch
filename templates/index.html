<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pattern-watch — {{ airport.name }}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛩️</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  /* Palette borrowed from VFR sectional charts: cream paper, navy ink,
     and the magenta used for untowered airports. */
  :root {
    --paper: #faf6ec;
    --paper-dark: #f1ead9;
    --ink: #1a2a5e;
    --ink-soft: #5a6486;
    --magenta: #b5297b;
    --card-border: #e0d6bf;
  }
  html, body { height: 100%; margin: 0; color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  #app { display: flex; height: 100%; }
  #map { flex: 1; position: relative; }

  /* --- sidebar ----------------------------------------------------------- */
  #sidebar { width: 340px; overflow-y: auto; padding: 14px 16px;
    background: var(--paper); border-left: 3px solid var(--magenta);
    box-sizing: border-box; }
  #sidebar h1 { font-size: 19px; margin: 0; letter-spacing: .02em; }
  #sidebar h1 .plane { color: var(--magenta); }
  #sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--ink-soft); margin: 20px 0 8px;
    border-bottom: 1px solid var(--card-border); padding-bottom: 4px; }
  #subtitle { color: var(--ink-soft); font-size: 13px; margin-top: 4px; }
  .code-chip { background: var(--magenta); color: #fff; font-size: 10.5px;
    font-weight: 700; padding: 1px 6px; border-radius: 4px;
    letter-spacing: .05em; margin-right: 5px; }
  #status, #countdown { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }
  #countdown { margin-top: 2px; }
  #shared-note { font-size: 10.5px; color: #a09880; font-style: italic; margin-top: 4px; }
  /* poll health dot: green live / amber rate-limited / red error / gray idle */
  .sdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; }
  .s-ok { background: #1e7d32; } .s-warn { background: #b45309; }
  .s-err { background: #b91c1c; } .s-idle { background: #8a8f9c; }
  #count-pill { background: var(--paper-dark); border: 1px solid var(--card-border);
    border-radius: 9px; padding: 0 7px; font-size: 10.5px; margin-left: 5px;
    letter-spacing: 0; }

  .sel-label { display: block; font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .07em; color: var(--ink-soft); margin: 10px 0 3px; }
  #state-select, #view-select { width: 100%; padding: 6px 8px;
    font-size: 13px; color: var(--ink); background: #fffdf7;
    border: 1px solid var(--card-border); border-radius: 6px; cursor: pointer; }
  #state-select:hover, #view-select:hover { border-color: var(--magenta); }

  ul { list-style: none; margin: 0; padding: 0; }

  /* aircraft cards */
  #traffic-list li { padding: 8px 10px; border-radius: 6px; margin-bottom: 6px;
    background: #fffdf7; border: 1px solid var(--card-border);
    font-size: 13px; cursor: pointer; }
  #traffic-list li:hover { border-color: var(--magenta); }
  #traffic-list li.empty { cursor: default; }
  #traffic-list li.empty:hover { border-color: var(--card-border); }
  #traffic-list .cs { font-weight: 700; font-size: 14px; }
  #traffic-list .state { float: right; font-size: 10.5px; padding: 2px 8px;
    border-radius: 9px; color: #fff; margin-top: 1px; }
  /* add-on tag for aircraft inside 2+ airports' watch areas — outline
     style so it never competes with the solid state-colour chip */
  #traffic-list .overlap { float: right; font-size: 10.5px; padding: 1px 7px;
    border-radius: 9px; border: 1px solid var(--magenta); color: var(--magenta);
    margin: 1px 5px 0 0; }
  #traffic-list .stats { margin-top: 5px; font-size: 12px; color: #444;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  /* brief pulse when an aircraft's state label changes */
  @keyframes stateflash { 0% { background: #f6d5e7; } 100% { background: #fffdf7; } }
  #traffic-list li.flash { animation: stateflash 1.6s ease-out 1; }
  /* hover-link highlight: card <-> map marker */
  #traffic-list li.hl { border-color: var(--magenta); background: #fdf0f7; }
  .plane-icon.hl svg { filter: drop-shadow(0 0 5px #b5297b) brightness(1.2); }

  #event-list li { font-size: 12px; color: var(--ink-soft); padding: 4px 0;
    border-bottom: 1px dashed var(--card-border);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .empty { color: #a09880; font-size: 13px; font-style: italic; }

  /* --- map overlay buttons -------------------------------------------------- */
  .map-btn { background: var(--magenta); color: #fff; font-weight: 700;
    font-size: 11px; letter-spacing: .1em; border: none; border-radius: 6px;
    padding: 6px 12px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.25); }

  #key-wrap { position: absolute; bottom: 22px; left: 10px; z-index: 1000; }
  #legend { background: var(--paper); border: 1px solid var(--card-border);
    border-radius: 6px; padding: 8px 12px; font-size: 12px; margin-bottom: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,.15); cursor: pointer;
    transition: transform .25s ease, opacity .25s ease; transform-origin: bottom left; }
  #legend.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }
  #legend .dot { display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 6px; vertical-align: -1px; }
  #legend .hint { color: var(--ink-soft); font-size: 10px; margin-top: 4px; }

  /* map tiles light/dark toggle, bottom-right above the attribution line */
  #theme-btn { position: absolute; bottom: 26px; right: 10px; z-index: 1000;
    background: var(--ink); }

  /* Google-Maps-style dark mode, faked from the LIGHT street tiles:
     - invert(1) turns white land dark gray while keeping every street
       visible (they were drawn on the light map, so they survive);
     - hue-rotate(180deg) swings the inverted (orange) water back to blue;
     - brightness/contrast are THE tuning knobs — raise brightness for a
       lighter gray land, lower it toward black. */
  .dark-tiles { filter: invert(1) hue-rotate(180deg) brightness(1.05)
    contrast(0.9) saturate(1.15); }

  .plane-icon svg { filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); }

  /* permanent callsign+altitude label beside each aircraft */
  .ac-label { background: rgba(250,246,236,.92); border: 1px solid var(--magenta);
    border-radius: 3px; color: var(--ink); font-size: 11px; padding: 1px 5px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    box-shadow: none; }
  .ac-label::before { display: none; } /* hide leaflet tooltip arrow */

  .ring-label { background: none; border: none; box-shadow: none;
    color: var(--magenta); font-size: 11px; font-weight: 600;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .ring-label::before { display: none; }

  .leaflet-popup-content-wrapper { background: #fffdf7; color: var(--ink);
    border: 1px solid var(--magenta); border-radius: 6px; }
  .leaflet-popup-tip { background: var(--magenta); }
</style>
</head>
<body>
<div id="app">
  <div id="map">
    <div id="key-wrap">
      <div id="legend"></div>
      <button id="key-btn" class="map-btn">KEY</button>
    </div>
    <button id="theme-btn" class="map-btn" title="toggle map tiles">DARK MAP</button>
  </div>
  <div id="sidebar">
    <h1><span class="plane">&#x2708;</span> pattern-watch</h1>
    <div id="subtitle"></div>
    <label class="sel-label" for="state-select">State</label>
    <select id="state-select" title="pick a state">
      {% for s in airports_by_state %}
      <option{% if s == state %} selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
    <label class="sel-label" for="view-select">View</label>
    <select id="view-select" title="whole state or one airport"></select>
    <div id="status">waiting for first poll…</div>
    <div id="countdown"></div>
    <div id="shared-note">shared demo — every visitor sees (and can change) the same view</div>
    <h2>Current traffic<span id="count-pill">0</span></h2>
    <ul id="traffic-list"></ul>
    <h2>Events</h2>
    <ul id="event-list"></ul>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let AIRPORT = {{ airport | tojson }};
let STATE = {{ state | tojson }};
let STATEWIDE = {{ statewide | tojson }};
let BOUNDS = {{ bounds | tojson }};       // [lamin, lomin, lamax, lomax] or null
// Every state's airports (name/lat/lon/elevation), for the View picker
// and for drawing airport symbols in statewide mode.
const AIRPORTS_BY_STATE = {{ airports_by_state | tojson }};
const POLL_MS = {{ poll_interval_s }} * 1000;
const BOX_RADIUS_NM = {{ box_radius_nm }};
const CEILING_AGL_FT = {{ ceiling_agl_ft }};
const MAGENTA = "#b5297b";
const RING_FILL = "#e05252";
// Sidebar cap for the statewide view — hundreds of DOM cards get slow.
const MAX_LIST = 100;

// One colour per state label; tuned to stay readable on light terrain tiles.
const STATE_COLORS = {
  "on ground": "#64748b",
  "departing": "#1e7d32",
  "inbound (descending toward field)": "#c05000",
  "maneuvering/pattern": "#1e4fa0",
  "overflight (high/fast, passing through)": "#7b3fa0",
  "en route": "#0e7490",
};
const STATE_SHORT = {
  "on ground": "ground",
  "departing": "departing",
  "inbound (descending toward field)": "inbound",
  "maneuvering/pattern": "pattern",
  "overflight (high/fast, passing through)": "overflight",
  "en route": "en route",
};

// Callsigns come from transponders, i.e. from the outside world — escape
// them before dropping into innerHTML.
const esc = (s) => String(s).replace(/[&<>"']/g,
  (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// "Rocky Mountain Metro (KBJC)" -> "KBJC"; "Texas (TX) — statewide" -> "TX".
function airportCode(name) {
  const m = /\(([A-Z0-9]{2,4})\)/.exec(name || "");
  return m ? m[1] : (name || "?");
}

// --- base map: light street tiles by default, dark tiles on toggle -----------
const map = L.map("map").setView([AIRPORT.lat, AIRPORT.lon], 11);

// CARTO Voyager: cream street basemap with NO terrain tinting. (The old
// OpenTopoMap tiles coloured the Rockies orange at low zooms — the whole
// state view turned orange.)
const lightTiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  maxZoom: 15,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>' +
    ' contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
});
// Dark mode = the standard OSM light street tiles run through the CSS
// filter above (.dark-tiles); className applies it to the tile images
// only, so markers/rings keep their normal colours.
const darkTiles = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 15,
  className: "dark-tiles",
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
});
lightTiles.addTo(map);

// Map-only theme toggle: swaps the tile layer, leaves the sidebar alone.
let darkMap = false;
const themeBtn = document.getElementById("theme-btn");
themeBtn.addEventListener("click", () => {
  darkMap = !darkMap;
  if (darkMap) { map.removeLayer(lightTiles); darkTiles.addTo(map); }
  else { map.removeLayer(darkTiles); lightTiles.addTo(map); }
  themeBtn.textContent = darkMap ? "LIGHT MAP" : "DARK MAP";
});

// --- airport symbols + range rings -------------------------------------------
const airportLayer = L.layerGroup().addTo(map);
let ringCircles = []; // the filled rings, so zoomend can restyle them

// The translucent fill must fade as you zoom in: once you're inside a
// ring, its circle is bigger than the screen and a fixed fill would tint
// the ENTIRE viewport red.
function ringFillOpacity(zoom) {
  if (zoom <= 11) return 0.18; // overview: rings read as solid shapes
  if (zoom === 12) return 0.10;
  return 0.03;                 // zoomed inside: barely-there wash
}
map.on("zoomend", () => {
  const op = ringFillOpacity(map.getZoom());
  for (const c of ringCircles) c.setStyle({ fillOpacity: op });
});

// On real sectionals an untowered field is a magenta circle — draw
// exactly that: magenta ring with a small centre dot.
function drawAirportSymbol(ap) {
  L.circleMarker([ap.lat, ap.lon],
      { radius: 9, color: MAGENTA, weight: 2.5, fillColor: "#fffdf7", fillOpacity: 0.85 })
    .addTo(airportLayer)
    .bindPopup(`<b>${esc(ap.name)}</b><br>field elevation ${ap.elevation_ft} ft MSL`);
  L.circleMarker([ap.lat, ap.lon],
      { radius: 2, color: MAGENTA, fillColor: MAGENTA, fillOpacity: 1 }).addTo(airportLayer);
}

// Fetch and draw the state's real border (the poll box is a rectangle,
// but only traffic inside this outline is shown — see borders.py).
async function drawBorder(state) {
  try {
    const resp = await fetch(`/api/border/${encodeURIComponent(state)}`);
    if (!resp.ok) return;
    const geom = await resp.json();
    // Guard against a stale response after a quick view switch.
    if (!STATEWIDE || state !== STATE) return;
    L.geoJSON(geom, {
      style: { color: MAGENTA, weight: 1.5, opacity: 0.8, fill: false },
      interactive: false,
    }).addTo(airportLayer);
  } catch (err) { /* border is decoration — never break the map over it */ }
}

function drawAirport(ap) {
  airportLayer.clearLayers();
  ringCircles = [];

  if (STATEWIDE) {
    // Statewide: each of the state's airports gets its symbol and a
    // single 10 nm outline ring (no fill — filled rings would smear the
    // whole state red), plus the real state border.
    for (const p of AIRPORTS_BY_STATE[STATE] || []) {
      drawAirportSymbol(p);
      L.circle([p.lat, p.lon], {
        radius: BOX_RADIUS_NM * 1852, color: MAGENTA, weight: 1,
        opacity: 0.5, dashArray: "6 6", fill: false, interactive: false,
      }).addTo(airportLayer);
    }
    drawBorder(STATE);
    if (BOUNDS) {
      map.fitBounds([[BOUNDS[0], BOUNDS[1]], [BOUNDS[2], BOUNDS[3]]]);
    }
    document.getElementById("subtitle").innerHTML =
      `<span class="code-chip">${esc(airportCode(ap.name))}</span>` +
      `${esc(ap.name)} · statewide · all altitudes`;
    return;
  }

  drawAirportSymbol(ap);
  // Range rings at 2/5/10 nm (1 nm = 1852 m), labelled at their north
  // edge, with a red fill that fades as you zoom in (see ringFillOpacity).
  for (const nm of [2, 5, 10]) {
    const ring = L.circle([ap.lat, ap.lon], {
      radius: nm * 1852, color: MAGENTA, weight: 1, opacity: 0.5,
      dashArray: "6 6", fillColor: RING_FILL,
      fillOpacity: ringFillOpacity(map.getZoom()), interactive: false,
    }).addTo(airportLayer);
    ringCircles.push(ring);
    L.marker([ap.lat + nm / 60, ap.lon], {
      icon: L.divIcon({ className: "ring-label", html: `${nm} nm`, iconSize: [40, 14], iconAnchor: [20, 7] }),
      interactive: false,
    }).addTo(airportLayer);
  }
  map.setView([ap.lat, ap.lon], 11);
  document.getElementById("subtitle").innerHTML =
    `<span class="code-chip">${esc(airportCode(ap.name))}</span>${esc(ap.name)} · ` +
    `${BOX_RADIUS_NM} nm box · below ${CEILING_AGL_FT.toLocaleString()} ft AGL`;
}

// --- collapsible colour key ---------------------------------------------------
const legend = document.getElementById("legend");
legend.innerHTML = Object.entries(STATE_COLORS)
  .map(([state, color]) => `<div><span class="dot" style="background:${color}"></span>${STATE_SHORT[state]}</div>`)
  .join("") + `<div class="hint">click to hide</div>`;
// Clicking the key slides it away; the KEY button brings it back (or
// hides it again — it's a plain toggle).
legend.addEventListener("click", () => legend.classList.add("hidden"));
document.getElementById("key-btn").addEventListener("click",
  () => legend.classList.toggle("hidden"));

// --- aircraft rendering -------------------------------------------------------

// A simple aircraft silhouette drawn pointing north, rotated per track.
const PLANE_PATH = "M12 2 L13.6 9 L21 12.4 L21 14 L13.4 12.8 L12.9 18 " +
  "L15.5 19.8 L15.5 21.2 L12 20.2 L8.5 21.2 L8.5 19.8 L11.1 18 " +
  "L10.6 12.8 L3 14 L3 12.4 L10.4 9 Z";

function planeIcon(trackDeg, color) {
  const rot = trackDeg == null ? 0 : trackDeg;
  return L.divIcon({
    className: "plane-icon",
    html: `<svg width="26" height="26" viewBox="0 0 24 24"` +
          ` style="transform:rotate(${rot}deg)"><path d="${PLANE_PATH}"` +
          ` fill="${color}" stroke="#fffdf7" stroke-width="0.8"/></svg>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
  });
}

function fmt(v, digits = 0, missing = "–") {
  return v == null ? missing : v.toFixed(digits);
}

// Compact altitude for the on-map label, e.g. 5,700 ft -> "5.7k".
function altShort(ft) {
  return ft == null ? "–" : (ft / 1000).toFixed(1) + "k";
}

function popupHtml(ac) {
  const overlaps = ac.overlaps || [];
  // Statewide aircraft far from every watched airport have no reference
  // point — show a note instead of a meaningless distance.
  const whereLine = ac.near == null && STATEWIDE
    ? `not near a watched airport`
    : `${fmt(ac.dist_nm, 1)} nm ${ac.compass || ""} of ` +
      (STATEWIDE ? esc(airportCode(ac.near)) : "the field");
  let html = `<b>${esc(ac.callsign)}</b> <small>(${esc(ac.icao24)})</small><br>` +
    `${fmt(ac.baro_alt_ft)} ft MSL` +
    (ac.agl_ft == null ? "" : ` (${fmt(ac.agl_ft)} ft AGL)`) + `<br>` +
    `${fmt(ac.speed_kt)} kt · ${fmt(ac.vrate_fpm)} fpm<br>` +
    `${whereLine}<br>` +
    `<b>${ac.state}</b>`;
  // Overlap details are click-only by design: popups open on click.
  if (overlaps.length > 0) {
    html += `<br><small>also within ${BOX_RADIUS_NM} nm of: ` +
      overlaps.map(esc).join(", ") + `</small>`;
  }
  return html;
}

const markers = {};    // icao24 -> Leaflet marker
const trails = {};     // icao24 -> { points: [[lat,lon], ...], line: L.polyline }
const prevStates = {}; // icao24 -> last state label (for the change flash)
let cardEls = {};      // icao24 -> sidebar <li>, rebuilt every poll
const TRAIL_MAX_POINTS = 20;

// --- hover linking: sidebar card <-> map marker --------------------------------
function setPlaneGlow(id, on) {
  const m = markers[id];
  if (m && m._icon) m._icon.classList.toggle("hl", on);
}
function highlightCard(id, on) {
  const li = cardEls[id];
  if (!li) return;
  li.classList.toggle("hl", on);
  if (on) li.scrollIntoView({ block: "nearest" });
}

// Glide a marker from where it is to its new position over ~1 s, instead
// of teleporting on every poll.
function animateMarker(marker, toLat, toLon) {
  const from = marker.getLatLng();
  const start = performance.now();
  const DURATION_MS = 1000;
  cancelAnimationFrame(marker._anim);
  function step(now) {
    const t = Math.min((now - start) / DURATION_MS, 1);
    marker.setLatLng([from.lat + (toLat - from.lat) * t,
                      from.lng + (toLon - from.lng) * t]);
    if (t < 1) marker._anim = requestAnimationFrame(step);
  }
  marker._anim = requestAnimationFrame(step);
}

function updateTrail(ac, color) {
  let trail = trails[ac.icao24];
  if (!trail) {
    trail = trails[ac.icao24] = {
      points: [],
      line: L.polyline([], { weight: 2, opacity: 0.4, interactive: false }).addTo(map),
    };
  }
  const last = trail.points[trail.points.length - 1];
  if (!last || last[0] !== ac.lat || last[1] !== ac.lon) {
    trail.points.push([ac.lat, ac.lon]);
    if (trail.points.length > TRAIL_MAX_POINTS) trail.points.shift();
  }
  trail.line.setLatLngs(trail.points);
  trail.line.setStyle({ color });
}

function removeAircraft(id) {
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (trails[id]) { map.removeLayer(trails[id].line); delete trails[id]; }
  delete prevStates[id];
}

// Diff by icao24 instead of recreating markers, so open popups don't
// flicker shut every poll and animation has a "from" position.
// Statewide: skip the permanent labels and trails — hundreds of labelled
// planes at state zoom is unreadable (popups on click still work).
function updateMap(aircraft) {
  const seen = new Set();
  for (const ac of aircraft) {
    seen.add(ac.icao24);
    const color = STATE_COLORS[ac.state] || "#333";
    const label = `${esc(ac.callsign)} · ${altShort(ac.baro_alt_ft)}`;
    if (markers[ac.icao24]) {
      const m = markers[ac.icao24];
      animateMarker(m, ac.lat, ac.lon);
      m.setIcon(planeIcon(ac.track_deg, color));
      m.getPopup().setContent(popupHtml(ac));
      if (m.getTooltip()) m.setTooltipContent(label);
    } else {
      const m = L.marker([ac.lat, ac.lon], { icon: planeIcon(ac.track_deg, color) })
        .addTo(map)
        .bindPopup(popupHtml(ac));
      if (!STATEWIDE) {
        m.bindTooltip(label, { permanent: true, direction: "right",
                               offset: [14, 0], className: "ac-label" });
      }
      const id = ac.icao24;
      m.on("mouseover", () => highlightCard(id, true));
      m.on("mouseout", () => highlightCard(id, false));
      markers[ac.icao24] = m;
    }
    if (!STATEWIDE) updateTrail(ac, color);
  }
  for (const id of Object.keys(markers)) {
    if (!seen.has(id)) removeAircraft(id);
  }
}

// --- sidebar -------------------------------------------------------------------

// Boil the server's free-text poll status down to a coloured health dot.
function statusHealth(s) {
  if (!s || s.includes("waiting") || s.includes("switching") || s.includes("not polled")) {
    return ["s-idle", "standby"];
  }
  if (s.startsWith("idle")) return ["s-idle", "resuming"];  // idle pause; our fetch wakes it
  if (s.startsWith("poll OK")) return ["s-ok", "live"];
  if (s.includes("rate limited")) return ["s-warn", "rate limited"];
  return ["s-err", "error"];
}

function updateSidebar(data) {
  const n = data.aircraft.length;
  const [cls, label] = statusHealth(data.status);
  // Only spell out the raw status when something is wrong — "live" says enough.
  const detail = cls === "s-ok" ? "" : ` · ${esc(data.status)}`;
  document.getElementById("status").innerHTML =
    `<span class="sdot ${cls}"></span><b>${label}</b> · updated ${data.updated_at || "–"}` +
    ` · ${n} aircraft${detail}`;
  document.getElementById("count-pill").textContent = n;
  document.title = `pattern-watch (${n}) — ${airportCode(AIRPORT.name)}`;

  const list = document.getElementById("traffic-list");
  list.innerHTML = "";
  cardEls = {};
  if (data.aircraft.length === 0) {
    list.innerHTML = '<li class="empty">no activity to display</li>';
  }
  for (const ac of data.aircraft.slice(0, MAX_LIST)) {
    const li = document.createElement("li");
    const color = STATE_COLORS[ac.state] || "#333";
    const overlaps = ac.overlaps || [];
    // Extra outline chip when inside 2+ watch areas; count includes the
    // watched airport itself, so 1 overlap -> "overlap ×2".
    const overlapChip = overlaps.length > 0
      ? `<span class="overlap" title="click the plane for details">overlap ×${overlaps.length + 1}</span>`
      : "";
    // Statewide cards say which airport the distance is measured from;
    // aircraft with no nearby watched airport get no distance at all.
    const distPart = ac.near == null && STATEWIDE
      ? ""
      : ` · ${fmt(ac.dist_nm, 1)} nm ${ac.compass || ""}` +
        (STATEWIDE ? ` of ${esc(airportCode(ac.near))}` : "");
    li.innerHTML =
      `<span class="cs">${esc(ac.callsign)}</span>` +
      `<span class="state" style="background:${color}">${STATE_SHORT[ac.state] || ac.state}</span>` +
      overlapChip +
      `<div class="stats">${fmt(ac.baro_alt_ft)} ft · ${fmt(ac.speed_kt)} kt · ` +
      `${fmt(ac.vrate_fpm, 0, "0")} fpm${distPart}</div>`;
    // Pulse the card when this aircraft's state label just changed.
    if (prevStates[ac.icao24] && prevStates[ac.icao24] !== ac.state) {
      li.classList.add("flash");
    }
    prevStates[ac.icao24] = ac.state;
    // Click a card -> fly to the aircraft and open its popup.
    li.addEventListener("click", () => {
      const m = markers[ac.icao24];
      if (m) { map.panTo(m.getLatLng()); m.openPopup(); }
    });
    // Hovering a card makes its plane glow on the map (and vice versa).
    li.addEventListener("mouseenter", () => setPlaneGlow(ac.icao24, true));
    li.addEventListener("mouseleave", () => setPlaneGlow(ac.icao24, false));
    cardEls[ac.icao24] = li;
    list.appendChild(li);
  }
  if (data.aircraft.length > MAX_LIST) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = `…and ${data.aircraft.length - MAX_LIST} more (all shown on the map)`;
    list.appendChild(li);
  }

  const evList = document.getElementById("event-list");
  evList.innerHTML = "";
  const events = data.events.slice().reverse(); // newest first
  if (events.length === 0) {
    evList.innerHTML = '<li class="empty">no events yet</li>';
  }
  for (const ev of events) {
    const li = document.createElement("li");
    li.textContent = ev;
    evList.appendChild(li);
  }
}

// --- airport switching ----------------------------------------------------------

const stateSelect = document.getElementById("state-select");
const viewSelect = document.getElementById("view-select");

// Fill the View picker with "whole state" + that state's airports.
function populateViewSelect(state, selectedName) {
  viewSelect.innerHTML = "";
  const all = document.createElement("option");
  all.value = "";
  all.textContent = "Entire state — all traffic";
  viewSelect.appendChild(all);
  for (const a of AIRPORTS_BY_STATE[state] || []) {
    const opt = document.createElement("option");
    opt.value = a.name;
    opt.textContent = a.name;
    if (a.name === selectedName) opt.selected = true;
    viewSelect.appendChild(opt);
  }
}

function switchAirport(ap, statewide, bounds, state) {
  AIRPORT = ap;
  STATE = state || STATE;
  STATEWIDE = !!statewide;
  BOUNDS = bounds || null;
  // Keep the two pickers in sync (matters when another tab switched).
  stateSelect.value = STATE;
  populateViewSelect(STATE, STATEWIDE ? null : ap.name);
  for (const id of Object.keys(markers)) removeAircraft(id);
  drawAirport(ap);
}

async function postSelection(state, name) {
  try {
    const resp = await fetch("/api/airport", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: state, name: name }),
    });
    const data = await resp.json();
    if (data.airport) {
      switchAirport(data.airport, data.statewide, data.bounds, data.state);
      refresh();
    }
  } catch (err) {
    document.getElementById("status").textContent = "couldn't switch view: " + err;
  }
}

// Picking a state jumps to its first airport (cheaper than statewide);
// pick "Entire state" from the View list for everything at once.
stateSelect.addEventListener("change", () => {
  const airports = AIRPORTS_BY_STATE[stateSelect.value] || [];
  postSelection(stateSelect.value, airports.length ? airports[0].name : null);
});
viewSelect.addEventListener("change", () => {
  postSelection(stateSelect.value, viewSelect.value || null);
});

// --- polling -------------------------------------------------------------------

let secondsToUpdate = POLL_MS / 1000;
setInterval(() => {
  secondsToUpdate = Math.max(0, secondsToUpdate - 1);
  document.getElementById("countdown").textContent =
    `next update in ${secondsToUpdate}s`;
}, 1000);

async function refresh() {
  try {
    const resp = await fetch("/api/traffic");
    const data = await resp.json();
    // If the server's view doesn't match ours (e.g. switched in another
    // tab), follow it before drawing anything.
    if (data.airport.name !== AIRPORT.name) {
      switchAirport(data.airport, data.statewide, data.bounds, data.state);
    }
    updateMap(data.aircraft);
    updateSidebar(data);
    secondsToUpdate = POLL_MS / 1000;
  } catch (err) {
    document.getElementById("status").textContent = "couldn't reach server: " + err;
  }
}

populateViewSelect(STATE, {{ selected_name | tojson }});
drawAirport(AIRPORT);
refresh();
setInterval(refresh, POLL_MS);
</script>
